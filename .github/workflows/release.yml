name: Build & Release DMG

on:
  push:
    tags:
      - 'v*'          # e.g. v1.0.0 — triggers a release build
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed to create a Release and upload assets

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build (Release)
        run: |
          xcodebuild \
            -project WoodenFish.xcodeproj \
            -scheme WoodenFish \
            -configuration Release \
            -derivedDataPath build/release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Ad-hoc sign the app
        run: |
          APP="build/release/Build/Products/Release/WoodenFish.app"
          # Strip any stale signature, then apply a clean deep ad-hoc signature
          # so the bundle's seal is internally consistent. Without this the app
          # opens as "damaged" once the download quarantine flag is set.
          codesign --remove-signature "$APP" 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package DMG
        run: |
          APP="build/release/Build/Products/Release/WoodenFish.app"
          STAGE="build/dmg-staging"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Knock the Wooden Fish" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            WoodenFish.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoodenFish-dmg
          path: WoodenFish.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WoodenFish.dmg
          generate_release_notes: true
          body: |
            ## Install

            1. Open `WoodenFish.dmg` and drag **WoodenFish** into **Applications**.
            2. This app is **not notarized** by Apple, so the first launch is blocked.
               Clear the download quarantine flag, then open it:

               ```bash
               xattr -dr com.apple.quarantine /Applications/WoodenFish.app
               open /Applications/WoodenFish.app
               ```

            > If macOS still says the app "is damaged", the `xattr` command above
            > is the fix — it removes the quarantine attribute macOS adds to files
            > downloaded from the internet. (Alternatively: right-click the app →
            > **Open** → **Open**.)
